spring.application.name=aerolink

# -------------------------------------------------------
# Aviation Weather API client configuration
# Decision: All timeouts externalised here so they can be
# tuned per environment without recompilation.
# Connect timeout is short to fail fast on unreachable hosts.
# Read timeout is longer to accommodate slower API responses.
# -------------------------------------------------------
aviation.weather.api.base-url=https://aviationweather.gov/api/data
aviation.weather.api.connect-timeout=5s
aviation.weather.api.read-timeout=10s
